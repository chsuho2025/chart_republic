<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Chart Republic tracks today's HOT 50 K-pop songs among Korea's youth-driven music signals."
    />
    <meta name="application-name" content="Chart Republic" />
    <meta name="theme-color" content="#000000" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://chart-republic.vercel.app/" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="preload" as="image" href="./public/images/hero-cover.png" />
    <meta property="og:title" content="Chart Republic Today's Hot 50" />
    <meta
      property="og:description"
      content="Korea youth-driven K-pop trend chart for global fandoms."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chart-republic.vercel.app/" />
    <meta property="og:image" content="https://chart-republic.vercel.app/public/images/hero-cover.png" />
    <meta property="og:site_name" content="Chart Republic" />
    <meta property="og:locale" content="ko_KR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chart Republic Today's Hot 50" />
    <meta name="twitter:description" content="Korea youth-driven K-pop trend chart for global fandoms." />
    <meta name="twitter:image" content="https://chart-republic.vercel.app/public/images/hero-cover.png" />
    <title>Chart Republic</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Chart Republic",
        "url": "https://chart-republic.vercel.app/",
        "inLanguage": ["ko", "en"],
        "description": "A bilingual K-pop HOT 50 chart focused on Korea's youth-driven music signals."
      }
    </script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <nav class="top-actions" aria-label="Site actions">
          <button class="settings-toggle" id="settingsToggle" type="button" aria-label="Settings">
            <img src="./public/icons/settings.png" alt="" />
          </button>
        </nav>
        <div class="settings-menu" id="settingsMenu" aria-hidden="true">
          <button class="settings-item" id="languageToggle" type="button">
            <span data-i18n="language">English</span>
          </button>
        </div>
      </header>

      <main>
        <section class="hero-board" id="heroRank" aria-label="Current number one"></section>

        <section class="tabs-section" aria-label="Generation filters">
          <div class="tabs" role="tablist" aria-label="Chart filters">
            <button class="tab active" type="button" data-filter="all" data-i18n="filterAll">전체</button>
            <button class="tab" type="button" data-filter="gen3" data-i18n="filterGen3">3세대</button>
            <button class="tab" type="button" data-filter="gen4" data-i18n="filterGen4">4세대</button>
          </div>
        </section>

        <section class="search-card" aria-label="Chart search">
          <label class="search">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10.8 4a6.8 6.8 0 0 1 5.43 10.9l3.43 3.43-1.41 1.41-3.43-3.43A6.8 6.8 0 1 1 10.8 4Zm0 2a4.8 4.8 0 1 0 0 9.6 4.8 4.8 0 0 0 0-9.6Z" />
            </svg>
            <input id="searchInput" type="search" autocomplete="off" data-i18n-placeholder="search" placeholder="곡 또는 아티스트 검색" />
          </label>
        </section>

        <section class="chart-panel" aria-label="Daily chart">
          <div class="chart-intro">
            <p data-i18n="chartIntro">한국 10·20대에게 가장 인기 있는 음악. 매일 업데이트됩니다.</p>
          </div>
          <div class="table-head" aria-hidden="true">
            <span data-i18n="rank">순위</span>
            <span data-i18n="track">곡</span>
          </div>
          <div class="chart-list" id="chartList"></div>
          <button class="load-more" id="loadMore" type="button" data-i18n="loadMore">더 보기</button>
        </section>
      </main>
    </div>

    <aside class="detail-panel" id="detailPanel" aria-hidden="true" aria-label="Track detail">
      <button class="close-button" id="closeDetail" type="button" aria-label="Close">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m6.4 5 5.6 5.6L17.6 5 19 6.4 13.4 12l5.6 5.6-1.4 1.4-5.6-5.6L6.4 19 5 17.6l5.6-5.6L5 6.4 6.4 5Z" />
        </svg>
      </button>
      <div id="detailContent"></div>
    </aside>
    <aside class="info-popup" id="chartInfoPopup" aria-hidden="true" aria-label="Chart Republic information">
      <button class="info-close" id="chartInfoClose" type="button" aria-label="Close">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m6.4 5 5.6 5.6L17.6 5 19 6.4 13.4 12l5.6 5.6-1.4 1.4-5.6-5.6L6.4 19 5 17.6l5.6-5.6L5 6.4 6.4 5Z" />
        </svg>
      </button>
      <div class="info-scroll">
        <h2>Chart Republic</h2>
        <p>Chart Republic는 한국 10·20대의 스트리밍과 숏폼 반응을 중심으로 K-POP의 오늘 흐름을 보여주는 차트입니다.</p>
        <p>오늘의 HOT 50은 팬덤이 매일 확인하고 공유할 수 있도록 상위 50곡의 순위, 변동, 상세 지표를 모바일 중심으로 정리합니다.</p>
      </div>
    </aside>
    <div class="scrim" id="scrim"></div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
