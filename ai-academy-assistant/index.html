<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>한빛수학 AI 상담</title>
    <meta name="description" content="학부모와 학생을 위한 근거 기반 수학학원 AI 상담 서비스" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/ai-academy-assistant/styles.css" />
  </head>
  <body>
    <div class="phone">
      <header class="header">
        <button class="header-button" id="back-button" aria-label="이전 화면">
          <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6" /></svg>
        </button>
        <button class="title-button" id="home-button">
          <b>한빛수학 AI</b>
        </button>
        <button class="header-button" id="menu-button" aria-label="전체 메뉴">
          <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
        </button>
      </header>

      <main id="app" aria-live="polite"></main>

      <div class="composer" id="composer">
        <textarea id="message" rows="1" aria-label="메시지 입력" placeholder="메시지를 입력해 주세요"></textarea>
        <button id="send-button" aria-label="메시지 보내기">
          <svg viewBox="0 0 24 24"><path d="m4 4 16 8-16 8 3-8-3-8Z"/><path d="M7 12h13"/></svg>
        </button>
      </div>
    </div>

    <div class="sheet-backdrop" id="sheet-backdrop"></div>
    <section class="sheet" id="sheet" aria-label="이용자 전환 메뉴">
      <div class="sheet-handle"></div>
      <h2>도움이 필요한 분</h2>
      <button class="sheet-item" data-role="prospective"><span class="sheet-icon">🔎</span><span><b>입학을 알아보는 학부모</b><small>반 추천 · 교육비 · 상담 예약</small></span><em>선택</em></button>
      <button class="sheet-item" data-role="parent"><span class="sheet-icon">📚</span><span><b>재원생 학부모</b><small>출결 · 보강 · 교육비 · 학습 현황</small></span><em>선택</em></button>
      <button class="sheet-item" data-role="student"><span class="sheet-icon">✏️</span><span><b>학원에 다니는 학생</b><small>수업 · 숙제 · 시험 일정</small></span><em>선택</em></button>
    </section>

    <div class="toast" id="toast" role="status"></div>
    <script src="/ai-academy-assistant/app.js"></script>
  </body>
</html>
